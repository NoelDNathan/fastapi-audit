version: "3.9"
services:
  api:
    build:
      context: .
      dockerfile: ./Dockerfile.dev
    ports:
      - "8000:8000"
    env_file:
      - env.dev
    volumes:
      - .:/app
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/fastapi_template
  db:
    image: postgis/postgis:15-3.4-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=fastapi_template
    ports:
      - "5432:5432"
   

volumes:
  postgres_data_dev:

